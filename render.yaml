services:
  - type: web
    name: syncdocs-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: PORT
        value: 3001
      - key: REDIS_URL
        sync: false
      - key: RENDER_URL
        sync: false
